<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora 💋 | Mi WhatsApp Privado</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --wa-green: #25D366;
            --wa-dark: #075E54;
            --accent: #ff4757;
            --bg-dark: #0A0A0A;
            --text-main: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 71, 87, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(37, 211, 102, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 450px;
            width: 90%;
            padding: 40px 20px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            padding: 5px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.3);
        }

        .status-dot {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            background: var(--wa-green);
            border-radius: 50%;
            border: 3px solid var(--bg-dark);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--wa-green), #128C7E);
            color: white;
            text-decoration: none;
            padding: 18px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-whatsapp:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.5);
        }

        .wa-icon {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .security-note {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .emoji-float {
            position: absolute;
            font-size: 2rem;
            opacity: 0.1;
            z-index: -1;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(100px, 100px) rotate(360deg); }
        }
    </style>
</head>

<body>

    <div class="emoji-float" style="top: 10%; left: 10%;">💋</div>

    <script>
        // Efecto de movimiento sutil al fondo
        document.body.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelector('.container').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>

</html>
